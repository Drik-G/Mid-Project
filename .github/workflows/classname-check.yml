name: Java Compilation and Quality Check

# Trigger the pipeline on any Pull Request to the main branch
on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clone the repository code onto the virtual runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up the Java Development Kit
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Test compilation. If javac fails, the pipeline fails and blocks the PR.
    - name: Compile Java Files
      run: |
        javac SpaceShip.java ReconShip.java CargoShip.java Main.java
